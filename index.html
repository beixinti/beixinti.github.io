<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北新的主页</title>

    <!-- 引入 Pico.css (CN 镜像或 CDN) 用于基础样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <!-- 引入 Alpine.js 用于交互逻辑 (defer 属性确保在 HTML 解析后执行) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

    <style>
        /* 确保主要内容垂直水平居中 */
        body, html {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
        }

        /* 背景图片样式 */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
            pointer-events: none;
        }

        /* 巨大标题样式 */
        .hero-title {
            position: fixed;
            bottom: 3rem;
            left: 2.5rem;
            z-index: 2;
            pointer-events: none;
        }

        .hero-title .subtitle {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.75rem);
            font-weight: 300;
            color: rgba(220, 213, 190, 0.8);
            margin: 0 0 0.5rem 0.2rem;
            line-height: 1.4;
        }

        .hero-title h1 {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-size: clamp(6rem, 18vw, 22rem);
            font-weight: 900;
            color: #dcd5be;
            margin: 0;
            padding: 0;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        /* 底部渐变遮罩 */
        .bottom-gradient {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.3) 50%, transparent 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* 顶部胶囊导航栏 */
        .capsule-nav {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        /* 胶囊容器 - 毛玻璃暗色背景 */
        .capsule-bar {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.4rem 0.5rem;
            border-radius: 9999px;
            background: rgba(15, 15, 25, 0.35);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 胶囊内链接 */
        .capsule-bar .nav-link {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            padding: 0.45rem 1.1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            white-space: nowrap;
            transition: background 0.25s ease, color 0.25s ease;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            line-height: 1.4;
        }

        .capsule-bar .nav-link:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            text-decoration: none;
        }

        .capsule-bar .nav-link:active {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 桌面宽屏：显示平铺菜单，隐藏汉堡按钮和下拉菜单 */
        .hamburger-btn {
            display: none;
        }

        .mobile-dropdown {
            display: none;
        }

        /* 响应式：竖屏 / 窄屏 折叠为汉堡菜单 */
        @media (max-width: 640px), (orientation: portrait) {
            /* 胶囊导航移到右侧 */
            .capsule-nav {
                left: auto;
                right: 1.5rem;
                transform: none;
            }

            /* 隐藏平铺链接 */
            .capsule-bar .nav-link.desktop-link {
                display: none;
            }

            /* 显示汉堡按钮 */
            .hamburger-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.9);
                cursor: pointer;
                padding: 0.4rem;
                border-radius: 50%;
                transition: background 0.2s ease;
                width: 2.2rem;
                height: 2.2rem;
            }

            .hamburger-btn:hover {
                background: rgba(255, 255, 255, 0.12);
            }

            /* 下拉菜单 - 毛玻璃胶囊（右对齐） */
            .mobile-dropdown {
                position: absolute;
                top: calc(100% + 0.6rem);
                right: 0;
                left: auto;
                transform: none;
                min-width: 160px;
                padding: 0.5rem;
                border-radius: 1.25rem;
                background: rgba(15, 15, 25, 0.4);
                backdrop-filter: blur(20px) saturate(180%);
                -webkit-backdrop-filter: blur(20px) saturate(180%);
                border: 1px solid rgba(255, 255, 255, 0.1);
                flex-direction: column;
                gap: 0.15rem;
            }

            .mobile-dropdown.open {
                display: flex;
            }

            .mobile-dropdown .nav-link {
                color: rgba(255, 255, 255, 0.85);
                text-decoration: none;
                padding: 0.55rem 1.2rem;
                border-radius: 0.75rem;
                font-size: 0.875rem;
                font-weight: 500;
                transition: background 0.2s ease;
                text-align: center;
                cursor: pointer;
                border: none;
                background: none;
                font-family: inherit;
                display: block;
                width: 100%;
            }

            .mobile-dropdown .nav-link:hover {
                background: rgba(255, 255, 255, 0.1);
                color: #ffffff;
                text-decoration: none;
            }
        }

        /* 竖屏响应式 */
        @media (max-width: 640px), (orientation: portrait) {
            .hero-title {
                left: 50%;
                bottom: auto;
                top: 50%;
                transform: translate(-50%, -50%);
                text-align: center;
            }

            .hero-title h1 {
                font-size: clamp(3.5rem, 18vw, 8rem);
            }

            .hero-title .subtitle {
                font-size: clamp(1.25rem, 4.5vw, 2rem);
                margin-left: 0;
                color: rgba(74, 73, 61, 0.8);
            }
        }

        /* 底部版权信息 - 右下角 */
        .site-footer {
            position: fixed;
            bottom: 0;
            right: 0;
            text-align: right;
            padding: 1rem 1.5rem;
            font-size: 0.75rem;
            z-index: 3;
        }

        .site-footer p {
            color: rgba(255, 255, 255, 0.5);
            margin: 0;
        }

        /* 复制成功气泡提示 */
        .copy-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            z-index: 9999;
            font-size: 0.875rem;
        }
    </style>
</head>

    <!-- 顶部胶囊导航栏 -->

        <!-- 移动端下拉菜单 -->

</html>
